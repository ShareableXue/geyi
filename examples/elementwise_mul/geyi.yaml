version: 1

source:
  files: [mul.cu]
  entry: elementwise_mul

launch:
  grid: ["ceil_div(n, 256)"]
  block: [256]
  shared_memory: 0

symbols:
  n: 1048576

tensors:
  a:
    dtype: float32
    shape: ["n"]
    stride: [1]
    access: read
  b:
    dtype: float32
    shape: ["n"]
    stride: [1]
    access: read
  out:
    dtype: float32
    shape: ["n"]
    stride: [1]
    access: write

assumptions:
  - id: no_alias
    text: "out does not alias a or b"

verification:
  reference: golden
  tolerance:
    atol: 1e-5
    rtol: 1e-5
