version: 1

source:
  files: [row_sum.cu]
  entry: row_reduce_sum

launch:
  grid: ["ceil_div(rows, 256)"]
  block: [256]
  shared_memory: 0

symbols:
  rows: 32
  cols: 64

tensors:
  x:
    dtype: float32
    shape: ["rows", "cols"]
    stride: ["cols", 1]
    layout: row_major_contiguous
    access: read
  out:
    dtype: float32
    shape: ["rows"]
    stride: [1]
    access: write

assumptions:
  - id: no_alias
    text: "out does not alias x"

verification:
  reference: golden
  tolerance:
    atol: 1e-5
    rtol: 1e-5
